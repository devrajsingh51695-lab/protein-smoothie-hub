<h1>Chocolate Oat Protein Smoothie</h1>

<img src="Chocolate-Oatmeal-Smoothie_13_WEB-e1739032266618.jpg" width="400">

<h2>Ingredients</h2>

<ul>
<li>1 scoop chocolate protein powder</li>
<li>1 banana</li>
<li>1 cup milk</li>
<li>½ cup oats</li>
</ul>

<h2>Instructions</h2>

<ol>
<li>Add ingredients to blender.</li>
<li>Blend until smooth.</li>
<li>Serve chilled.</li>
</ol>
